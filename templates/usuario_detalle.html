{% extends "base.html" %}

{% block title %}Detalle de Usuario - {{ usuario.nombre }} {{ usuario.apellido or '' }} - Masonite{% endblock %}
{% block extra_css %}
<style>

/* 🌸 FONDO CLARO PREMIUM */
body {
    background: linear-gradient(135deg, #fff0f5, #ffe6f0);
    color: #2a0f1f;
}

/* CONTENEDOR */
.detail-page {
    padding: var(--spacing-2xl) 0;
    min-height: 60vh;
}

/* 🔙 BACK */
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #b36680;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: var(--spacing-lg);
}
.back-link:hover { color: var(--color-primary); }

/* GRID */
.detail-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: var(--spacing-xl);
}

/* =========================================
   🌸 SIDEBAR MODERNO CLARO
========================================= */
.detail-sidebar {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(255,77,166,0.2);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.4);
    position: sticky;
    top: 20px;
}

/* HEADER */
.sidebar-header {
    padding: var(--spacing-2xl);
    text-align: center;
    background: linear-gradient(135deg, #ff4da6, #e60073);
}

/* AVATAR */
.user-avatar-large {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: white;
    color: #ff4da6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 30px;
    margin: 0 auto var(--spacing-md);
}

/* NAME */
.user-full-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
}
.user-email {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
}

/* BADGES */
.sidebar-badges {
    padding: var(--spacing-lg);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.badge {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
}

.badge-active { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-inactive { background: rgba(255,77,166,0.15); color: #ff4da6; }

/* META */
.sidebar-meta {
    padding: var(--spacing-lg);
}

.meta-item {
    margin-bottom: var(--spacing-md);
}
.meta-label {
    font-size: 10px;
    color: #b36680;
}
.meta-value {
    font-size: 14px;
    font-weight: 600;
    color: #2a0f1f;
}

/* BUTTONS */
.sidebar-actions {
    padding: var(--spacing-lg);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* =========================================
   💎 MAIN CONTENT
========================================= */
.detail-main {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-lg);
}

/* CARD */
.detail-card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255,77,166,0.15);
    border: 1px solid rgba(255,255,255,0.5);
}

/* HEADER */
.detail-card-header {
    padding: var(--spacing-lg);
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

/* TITLE */
.detail-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-primary);
    text-transform: uppercase;
}

/* BODY */
.detail-card-body {
    padding: var(--spacing-xl);
}

/* GRID */
.detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-lg);
}

/* ITEM */
.detail-item label {
    font-size: 11px;
    color: #b36680;
}
.detail-value {
    font-size: 15px;
    font-weight: 600;
    color: #2a0f1f;
}

/* NOTES */
.notes-box {
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    padding: var(--spacing-lg);
    border: 1px solid rgba(255,255,255,0.5);
}

/* =========================================
   🔥 BOTONES PRO
========================================= */
.btn {
    padding: 10px 18px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: 0.2s;
}

/* PRIMARY */
.btn-primary {
    background: linear-gradient(135deg, #ff4da6, #e60073);
    color: white;
}
.btn-primary:hover {
    transform: translateY(-2px);
}

/* EDIT */
.btn-warning {
    background: rgba(255,165,0,0.2);
    color: #e67e22;
}

/* CANCEL */
.btn-secondary {
    background: rgba(0,0,0,0.05);
    color: #2a0f1f;
}

/* DELETE */
.btn-danger-outline {
    border: 1px solid #ff4da6;
    color: #ff4da6;
    background: transparent;
}
.btn-danger-outline:hover {
    background: #ff4da6;
    color: white;
}

/* =========================================
   ⚠️ MODAL DELETE
========================================= */
.confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: center;
}
.confirm-overlay.active { display: flex; }

.confirm-card {
    background: white;
    padding: var(--spacing-2xl);
    border-radius: 20px;
    text-align: center;
}

/* =========================================
   📱 RESPONSIVE
========================================= */
@media (max-width: 900px) {
    .detail-layout {
        grid-template-columns: 1fr;
    }

    .detail-grid {
        grid-template-columns: 1fr;
    }
}

</style>
{% endblock %}
{% block extra_js %}
<script>
async function executeDelete() {
    try {
        const res = await fetch('/api/usuarios/{{ usuario.id }}', { method: 'DELETE' });
        const data = await res.json();
        if (res.ok) {
            window.location.href = "{{ url_for('usuarios') }}?success=eliminado&nombre={{ (usuario.nombre + ' ' + (usuario.apellido or ''))|urlencode }}";
        } else {
            document.getElementById('confirmDelete').classList.remove('active');
            alert(data.error || 'No se pudo eliminar el usuario');
        }
    } catch(e) {
        alert('Error de conexión');
    }
}

// Close overlay on background click
document.getElementById('confirmDelete').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});
</script>
{% endblock %}
